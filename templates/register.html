{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - MyStore</title>

    <link rel="stylesheet" href="{% static 'css/style.css' %}">

    <style>

        .register-card{

            width:450px;

            margin:70px auto;

            background:white;

            padding:35px;

            border-radius:15px;

            box-shadow:0 10px 25px rgba(0,0,0,.15);

        }

        .register-card h1{

            text-align:center;

            margin-bottom:25px;

        }

        .register-card input{

            width:100%;

            padding:12px;

            margin:10px 0;

            border:1px solid #ccc;

            border-radius:8px;

            font-size:16px;

            box-sizing:border-box;

        }

        .register-btn{

            width:100%;

            padding:14px;

            background:#198754;

            color:white;

            border:none;

            border-radius:8px;

            font-size:17px;

            cursor:pointer;

            margin-top:15px;

        }

        .register-btn:hover{

            background:#157347;

        }

        .bottom-text{

            text-align:center;

            margin-top:20px;

        }

    </style>

</head>

<body>

<nav class="navbar">

    <div class="logo">
        🛒 MyStore
    </div>

    <div class="nav-links">

        <a href="/">Home</a>
        <a href="{% url 'login' %}">Login</a>

    </div>

</nav>

<div class="register-card">

    <h1>📝 Create Account</h1>

    <form method="POST">

        {% csrf_token %}

        {{ form.as_p }}

        <button class="register-btn" type="submit">
            Create Account
        </button>

    </form>

    <div class="bottom-text">

        Already have an account?

        <a href="{% url 'login' %}">
            Login
        </a>

    </div>

</div>

<footer class="footer">

    <h3>🛒 MyStore</h3>

    <p>Your Trusted Online Shopping Store</p>

    <p>© 2026 MyStore | Developed by Vishal Singh</p>

</footer>

</body>
</html>

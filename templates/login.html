{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - MyStore</title>

    <link rel="stylesheet" href="{% static 'css/style.css' %}">

    <style>

        .login-card{

            width:400px;

            margin:80px auto;

            background:white;

            padding:35px;

            border-radius:15px;

            box-shadow:0 10px 25px rgba(0,0,0,.15);

        }

        .login-card h1{

            text-align:center;

            margin-bottom:25px;

        }

        .login-card input{

            width:100%;

            padding:12px;

            margin:10px 0;

            border:1px solid #ccc;

            border-radius:8px;

            font-size:16px;

            box-sizing:border-box;

        }

        .login-btn{

            width:100%;

            padding:14px;

            background:#0d6efd;

            color:white;

            border:none;

            border-radius:8px;

            font-size:17px;

            cursor:pointer;

            margin-top:15px;

        }

        .login-btn:hover{

            background:#0b5ed7;

        }

        .bottom-text{

            text-align:center;

            margin-top:20px;

        }

    </style>

</head>

<body>

<nav class="navbar">

    <div class="logo">
        🛒 MyStore
    </div>

    <div class="nav-links">

        <a href="/">Home</a>
        <a href="{% url 'register' %}">Register</a>

    </div>

</nav>

<div class="login-card">

    <h1>🔐 Login</h1>

    <form method="POST">

        {% csrf_token %}

        {{ form.as_p }}

        <button class="login-btn" type="submit">
            Login
        </button>

    </form>

    <div class="bottom-text">

        Don't have an account?

        <a href="{% url 'register' %}">
            Register
        </a>

    </div>

</div>

<footer class="footer">

    <h3>🛒 MyStore</h3>

    <p>Your Trusted Online Shopping Store</p>

    <p>© 2026 MyStore | Developed by Vishal Singh</p>

</footer>

</body>
</html>
